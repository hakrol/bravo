<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Slik leser du lønnsstatistikk</title>
  <desc id="desc">Illustrasjon til blogginnlegg om lønnsstatistikk.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5efe5" />
      <stop offset="100%" stop-color="#dcebdc" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="64" y="64" width="1072" height="502" rx="24" fill="#ffffff" opacity="0.9" />
  <circle cx="200" cy="180" r="54" fill="#14532d" opacity="0.12" />
  <circle cx="1000" cy="450" r="88" fill="#b45309" opacity="0.12" />
  <text x="104" y="220" fill="#14532d" font-family="Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="4">
    BLOGG
  </text>
  <text x="104" y="300" fill="#1b2430" font-family="Arial, sans-serif" font-size="56" font-weight="700">
    Slik leser du
  </text>
  <text x="104" y="370" fill="#1b2430" font-family="Arial, sans-serif" font-size="56" font-weight="700">
    lønnsstatistikk riktig
  </text>
  <text x="104" y="458" fill="#5f6773" font-family="Arial, sans-serif" font-size="28">
    Forstå tallene bedre før du sammenligner deg med markedet
  </text>
